name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required files
        run: |
          test -f index.html
          test -f README.md
          test -f .env.example
      - name: Basic HTML sanity check
        run: grep -qi "<html" index.html
